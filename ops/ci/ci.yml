# DSUSA Platform CI — F0 and forward.
# Per Implementation Program §21: lint -> unit -> contract -> build -> migration dry-run ->
# invariant subset -> integration -> contract-drift check. F0 wires the runnable subset.
name: dsusa-ci

on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  f0:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }

      # Migration ordering + rollback pairing (no DB needed).
      - name: Migration check
        run: node --experimental-strip-types ops/verify/check-migrations.ts

      # Unit tests (dependency-free; Node native type stripping). Cumulative across stages.
      - name: Unit + integration tests (all stages)
        run: node --experimental-strip-types --test libs/types/test/*.test.ts libs/auth-kit/test/*.test.ts libs/idempotency-kit/test/*.test.ts libs/audit-kit/test/*.test.ts platform/audit/test/*.test.ts platform/event/test/*.test.ts platform/authorization/test/*.test.ts platform/rules/test/*.test.ts platform/workflow/test/*.test.ts

      # Implementation verification harnesses (assembled-component invariants).
      - name: F0 verification
        run: node --experimental-strip-types ops/verify/verify-f0.ts
      - name: Audit Service verification
        run: node --experimental-strip-types ops/verify/verify-audit.ts
      - name: Event Platform verification
        run: node --experimental-strip-types ops/verify/verify-event.ts
      - name: Authorization Service verification + correctness review
        run: node --experimental-strip-types ops/verify/verify-authz.ts
      - name: Rules Engine verification + correctness review
        run: node --experimental-strip-types ops/verify/verify-rules.ts
      - name: Workflow Service verification + correctness review
        run: node --experimental-strip-types ops/verify/verify-workflow.ts
      - name: Cross-Service Consistency Review (PMS-1..PMS-5)
        run: node --experimental-strip-types ops/verify/verify-consistency.ts

      # Migration dry-run against an ephemeral Postgres (forward + rollback).
      - name: Migration dry-run (Postgres)
        run: |
          echo "In CI this applies db/migrations/*.sql forward then *_down.sql against a throwaway"
          echo "Postgres service container, asserting both directions succeed. Skipped where no DB."
